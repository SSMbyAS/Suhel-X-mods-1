<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MD SUHEL SMM PANEL</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #38bdf8; --bg: #0f172a; --card: #1e293b; --whatsapp: #25d366; --telegram: #0088cc; --youtube: #ff0000; --gold: #facc15; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; display: flex; flex-direction: column; align-items: center; padding: 15px; margin: 0; padding-bottom: 150px; overflow-x: hidden; }
        
        @keyframes rainbow {
            0% { color: #ff0000; text-shadow: 0 0 10px #ff0000; }
            50% { color: #00ff00; text-shadow: 0 0 10px #00ff00; }
            100% { color: #ff0000; text-shadow: 0 0 10px #ff0000; }
        }

        .header-top { width: 100%; max-width: 450px; display: flex; justify-content: center; margin-bottom: 10px; padding: 10px 0; }
        .logo-box { background: rgba(255, 255, 255, 0.1); padding: 8px 25px; border-radius: 50px; border: 2px solid rgba(255,255,255,0.2); }
        .changing-text { font-weight: 900; letter-spacing: 2px; font-size: 18px; animation: rainbow 3s linear infinite; }

        .offer-wrapper { width: 100%; max-width: 450px; background: #ef4444; color: white; overflow: hidden; white-space: nowrap; border-radius: 8px; margin-bottom: 15px; padding: 8px 0; border: 1px solid #fee2e2; }
        .offer-text { display: inline-block; padding-left: 100%; animation: marquee 15s linear infinite; font-weight: bold; font-size: 14px; }
        @keyframes marquee { 0% { transform: translate(0, 0); } 100% { transform: translate(-100%, 0); } }

        .share-box { width: 95%; max-width: 430px; display: flex; gap: 8px; margin-bottom: 15px; }
        .share-btn { flex: 1; padding: 10px; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 5px; text-decoration: none; font-size: 11px; border: none; }
        .wa-btn { background: var(--whatsapp); }
        .tg-btn { background: var(--telegram); }
        .cp-btn { background: #64748b; }

        .stats-card { width: 95%; max-width: 430px; background: white; color: #1e293b; border-radius: 12px; padding: 15px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border-left: 5px solid #22c55e; }
        .stats-info h2 { margin: 0; font-size: 28px; color: #0f172a; font-weight: 900; }
        .live-dot { height: 8px; width: 8px; background-color: #ef4444; border-radius: 50%; display: inline-block; animation: blink 1s infinite; margin-right: 5px; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0; } 100% { opacity: 1; } }

        .card { background: var(--card); padding: 20px; border-radius: 15px; width: 100%; max-width: 450px; border: 1px solid #334155; box-shadow: 0 10px 25px rgba(0,0,0,0.3); box-sizing: border-box; margin-bottom: 20px; }
        label { display: block; margin: 12px 0 6px; font-weight: 600; font-size: 13px; color: #94a3b8; text-transform: uppercase; }
        input, select { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; margin-bottom: 10px; font-size: 14px; outline: none; box-sizing: border-box; }
        
        .price-box { background: #0ea5e9; color: white; padding: 15px; border-radius: 10px; text-align: center; font-weight: bold; font-size: 26px; margin: 20px 0; border: 2px solid #38bdf8; }
        .btn-pay { width: 100%; background: #22c55e; color: white; border: none; padding: 16px; border-radius: 10px; cursor: pointer; font-size: 18px; font-weight: bold; transition: 0.3s; }

        .float-btns { position: fixed; bottom: 20px; right: 20px; display: flex; flex-direction: column; gap: 15px; z-index: 1000; }
        .circle-btn { width: 65px; height: 65px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; text-decoration: none; border: 2px solid white; box-shadow: 0 4px 15px rgba(0,0,0,0.4); cursor: pointer; text-align: center; }
        .whatsapp-btn { background: var(--whatsapp); font-size: 9px; font-weight: bold; flex-direction: column; line-height: 1.1; }
        .history-btn { background: var(--primary); font-size: 24px; }

        #qr-section { display: none; text-align: center; margin-top: 20px; padding-top: 20px; border-top: 1px dashed #334155; }
        .qr-img { width: 200px; border: 5px solid white; border-radius: 10px; margin: 10px 0; }
    </style>
</head>
<body>

<div class="header-top">
    <div class="logo-box"><span class="changing-text">SMMbyAS</span></div>
</div>

<div class="offer-wrapper">
    <div class="offer-text">🔥 SPECIAL OFFER: Instagram Views starting at ₹4 only! | YouTube Subscribers 1k at ₹10 [NG] | ⚡ FAST DELIVERY | 24/7 SUPPORT 🔥</div>
</div>

<div class="stats-card">
    <div style="font-size: 30px; color: #22c55e;"><i class="fas fa-check-double"></i></div>
    <div class="stats-info" style="text-align: right;">
        <p style="margin:0; font-size:10px; color:#64748b; font-weight: bold;"><span class="live-dot"></span>LIVE ORDERS DELIVERED</p>
        <h2 id="totalOrdersCount">315</h2>
    </div>
</div>

<div class="card">
    <label><i class="fas fa-link"></i> Target Link</label>
    <input type="text" id="targetLink" placeholder="Paste link here...">

    <label><i class="fas fa-list"></i> Category</label>
    <select id="categorySelect" onchange="loadServices()">
        <option value="">-- Choose Category --</option>
        <optgroup label="Instagram Services">
            <option value="ig_views">Instagram Views 🎬</option>
            <option value="ig_likes">Instagram Likes ❤️</option>
            <option value="ig_likes_in">Instagram Likes India 🇮🇳</option>
            <option value="ig_shares">Instagram Shares 🚀</option>
            <option value="ig_f_no">Followers No Refill 🫥</option>
            <option value="ig_f_10">Followers 0-10% Drop 📉</option>
            <option value="ig_f_05">Followers 0-05% Drop 📈</option>
            <option value="ig_pkg_f">Follower Package 📦</option>
            <option value="ig_pkg_v">Views Package 📦</option>
            <option value="ig_pkg_l">Likes Package 📦</option>
            <option value="ig_comm">Comments Random 💬</option>
        </optgroup>
    </select>

    <label><i class="fas fa-box-open"></i> Select Package</label>
    <select id="serviceSelect" onchange="updatePrice()"><option value="">Select Category First</option></select>

    <div class="price-box" id="priceDisplay">₹0.00</div>
    <button class="btn-pay" id="payBtn" onclick="showQR()">Place Order</button>

    <div id="qr-section">
        <p style="color:var(--gold); font-weight:bold;">Payable: ₹<span id="finalAmt">0.00</span></p>
        <img src="" id="qrImg" class="qr-img">
        <p style="font-size:12px;">UPI: 7388720012@fam</p>
        <input type="text" id="utr" placeholder="Enter 12 Digit UTR Number">
        <button class="btn-pay" style="background:#2563eb;" id="confirmBtn" onclick="submitOrder()">Confirm Payment</button>
    </div>
</div>

<div class="float-btns">
    <div class="circle-btn history-btn" onclick="alert('History checking...')"><i class="fas fa-history"></i></div>
    <a href="https://wa.me/917388720012" class="circle-btn whatsapp-btn" target="_blank">
        <i class="fab fa-whatsapp" style="font-size:22px;"></i>
        <span>CARE 24x7</span>
    </a>
</div>

<script>
    // LIVE ORDER COUNTER: Start 315, +1 every 30 mins
    function updateLiveOrders() {
        const startVal = 315;
        const startTime = new Date("2026-03-18T10:00:00").getTime();
        const now = new Date().getTime();
        const diff = Math.floor((now - startTime) / (30 * 60 * 1000));
        document.getElementById("totalOrdersCount").innerText = startVal + (diff > 0 ? diff : 0);
    }
    setInterval(updateLiveOrders, 60000);
    updateLiveOrders();

    const serviceData = {
        "ig_views": [
            {name: "10k Views", price: 4}, {name: "20k Views", price: 8}, 
            {name: "50k Views", price: 16}, {name: "100k Views", price: 30}, {name: "1M Views", price: 200}
        ],
        "ig_likes": [
            {name: "1k Likes", price: 10}, {name: "10k Likes", price: 100}, {name: "100k Likes", price: 600}
        ],
        "ig_likes_in": [
            {name: "1k Indian Likes 🇮🇳", price: 15}, {name: "10k Indian Likes 🇮🇳", price: 120}, {name: "100k Indian Likes 🇮🇳", price: 1100}
        ],
        "ig_shares": [
            {name: "100 Shares", price: 1}, {name: "1k Shares", price: 1.5}, {name: "10k Shares", price: 12}, {name: "100k Shares", price: 8}
        ],
        "ig_f_no": [
            {name: "100 Followers (No Refill)", price: 3}, {name: "1k Followers (No Refill)", price: 20}, {name: "10k Followers (No Refill)", price: 190}
        ],
        "ig_f_10": [
            {name: "100 Followers (0-10% Drop)", price: 3}, {name: "1k Followers (0-10% Drop)", price: 36}, {name: "10k Followers (0-10% Drop)", price: 350}
        ],
        "ig_f_05": [
            {name: "100 Followers (0-05% Drop)", price: 5}, {name: "1k Followers (0-05% Drop)", price: 50}, {name: "10k Followers (0-05% Drop)", price: 420}
        ],
        "ig_pkg_f": [
            {name: "5k Follower Package 📦", price: 380}, {name: "10k Follower Package 📦", price: 750}
        ],
        "ig_pkg_v": [
            {name: "10k Views Package 📦", price: 5}, {name: "50k Views Package 📦", price: 17}, 
            {name: "100k Views Package 📦", price: 25}, {name: "500k Views Package 📦", price: 60}, {name: "1M Views Package 📦", price: 120}
        ],
        "ig_pkg_l": [
            {name: "10k Likes Package 📦", price: 90}, {name: "20k Likes Package 📦", price: 160}
        ],
        "ig_comm": [
            {name: "100 Comments", price: 7}, {name: "1k Comments", price: 46}
        ]
    };

    function loadServices() {
        const cat = document.getElementById("categorySelect").value;
        const sSelect = document.getElementById("serviceSelect");
        sSelect.innerHTML = "";
        if(cat && serviceData[cat]) {
            serviceData[cat].forEach(s => {
                let opt = document.createElement("option");
                opt.value = JSON.stringify(s);
                opt.text = `${s.name} - ₹${s.price}`;
                sSelect.add(opt);
            });
        } else { sSelect.add(new Option("Select Category First", "")); }
        updatePrice();
    }

    function updatePrice() {
        const val = document.getElementById("serviceSelect").value;
        if(val) {
            const s = JSON.parse(val);
            document.getElementById("priceDisplay").innerText = "₹" + s.price;
            document.getElementById("finalAmt").innerText = s.price;
            document.getElementById("qrImg").src = `https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=upi://pay?pa=7388720012@fam%26am=${s.price}%26cu=INR`;
        }
    }

    function showQR() {
        if(!document.getElementById("targetLink").value) return alert("Link daalo!");
        document.getElementById("qr-section").style.display = "block";
        document.getElementById("payBtn").style.display = "none";
    }

    function submitOrder() {
        if(document.getElementById("utr").value.length < 12) return alert("Sahi UTR daalo!");
        alert("✅ Order Placed! Suhel Bhai check karke start kar denge.");
        location.reload();
    }
</script>
</body>
</html>
