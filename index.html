<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMMBYSUHL - Instagram Special Panel</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #38bdf8; --bg: #0f172a; --card: #1e293b; --whatsapp: #25d366; --telegram: #0088cc; --gold: #facc15; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; display: flex; flex-direction: column; align-items: center; padding: 15px; margin: 0; padding-bottom: 100px; overflow-x: hidden; }
        
        /* Header & History Icon */
        .header-container { width: 100%; max-width: 450px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; width: 95%; }
        .logo-box { background: rgba(255, 255, 255, 0.1); padding: 8px 20px; border-radius: 50px; border: 2px solid rgba(255,255,255,0.2); flex-grow: 1; text-align: center; margin-right: 10px; }
        .changing-text { font-weight: 900; letter-spacing: 2px; font-size: 18px; animation: rainbow 3s linear infinite; }
        .history-btn { width: 45px; height: 45px; background: var(--card); border: 2px solid var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: var(--primary); cursor: pointer; font-size: 18px; box-shadow: 0 0 10px rgba(56, 189, 248, 0.3); }

        @keyframes rainbow { 0% { color: #ff0000; } 50% { color: #00ff00; } 100% { color: #ff0000; } }

        .card { background: var(--card); padding: 20px; border-radius: 15px; width: 100%; max-width: 450px; border: 1px solid #334155; box-sizing: border-box; margin-bottom: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        label { display: block; margin: 12px 0 6px; font-weight: 600; font-size: 13px; color: #94a3b8; text-transform: uppercase; }
        input, select { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; margin-bottom: 10px; font-size: 14px; outline: none; box-sizing: border-box; }
        
        .price-box { background: #0ea5e9; color: white; padding: 15px; border-radius: 10px; text-align: center; font-weight: bold; font-size: 26px; margin: 20px 0; border: 2px solid #38bdf8; }
        .btn-pay { width: 100%; background: #22c55e; color: white; border: none; padding: 16px; border-radius: 10px; cursor: pointer; font-size: 18px; font-weight: bold; transition: 0.3s; }

        /* History Modal */
        #history-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 3000; flex-direction: column; align-items: center; padding-top: 50px; }
        .history-box { background: var(--card); width: 90%; max-width: 400px; max-height: 70vh; overflow-y: auto; border-radius: 15px; padding: 20px; border: 1px solid var(--primary); }
        .history-item { background: #0f172a; padding: 10px; border-radius: 8px; margin-bottom: 10px; font-size: 12px; border-left: 4px solid var(--primary); }
        .history-item span { color: var(--gold); }

        #qr-section { display: none; text-align: center; margin-top: 20px; padding-top: 20px; border-top: 1px dashed #334155; }
        .qr-img { width: 180px; border: 4px solid white; border-radius: 10px; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="header-container">
    <div class="logo-box"><span class="changing-text">SMMBYSUHL</span></div>
    <div class="history-btn" onclick="openHistory()"><i class="fas fa-history"></i></div>
</div>

<div class="card">
    <label><i class="fas fa-link"></i> Target Link</label>
    <input type="text" id="targetLink" placeholder="Instagram link paste karein...">

    <label><i class="fas fa-list"></i> Category</label>
    <select id="categorySelect" onchange="loadServices()">
        <option value="">-- Choose Category --</option>
        <option value="ig_views">Instagram Views 🎬</option>
        <option value="ig_likes">Instagram Likes ❤️</option>
        <option value="ig_likes_in">Instagram Likes India 🇮🇳</option>
        <option value="ig_shares">Instagram Shares 🚀</option>
        <option value="ig_f_no">Followers No Refill 🫥</option>
        <option value="ig_f_10">Followers 0-10% Drop 📉</option>
        <option value="ig_f_05">Followers 0-05% Drop 📈</option>
        <option value="ig_pkg_f">Follower Package 📦</option>
        <option value="ig_views_pkg">Views Package 📦</option>
        <option value="ig_likes_pkg">Likes Package 📦</option>
        <option value="ig_comm">Comments Random 💬</option>
    </select>

    <label><i class="fas fa-box-open"></i> Select Package</label>
    <select id="serviceSelect" onchange="updatePrice()"><option value="">Select Category First</option></select>

    <div class="price-box" id="priceDisplay">₹0.00</div>
    
    <button class="btn-pay" id="payBtn" onclick="showQR()">Place Order</button>

    <div id="qr-section">
        <p style="color:var(--gold); font-weight:bold;">Payable: ₹<span id="finalAmt">0.00</span></p>
        <img src="" id="qrImg" class="qr-img">
        <p style="font-size:12px;">UPI: 7388720012@fam</p>
        <input type="text" id="utr" placeholder="Enter 12 Digit UTR Number">
        <button class="btn-pay" style="background:#2563eb;" id="confirmBtn" onclick="submitOrder()">Confirm Payment</button>
    </div>
</div>

<div id="history-modal">
    <div class="history-box">
        <h3 style="margin-top:0; color:var(--primary); text-align: center;">Your Orders</h3>
        <div id="historyList"></div>
        <button class="btn-pay" style="background:#64748b; margin-top:15px; padding: 10px;" onclick="closeHistory()">Close</button>
    </div>
</div>

<script>
    const scriptURL = 'YOUR_GOOGLE_SCRIPT_URL_HERE'; 

    const serviceData = {
        "ig_views": [
            {name: "1k Views", price: 1, qty: 1000}, {name: "10k Views", price: 4, qty: 10000}, 
            {name: "20k Views", price: 8, qty: 20000}, {name: "50k Views", price: 16, qty: 50000}, 
            {name: "100k Views", price: 30, qty: 100000}, {name: "1M Views", price: 200, qty: 1000000}
        ],
        "ig_likes": [
            {name: "1k Likes", price: 10, qty: 1000}, {name: "10k Likes", price: 100, qty: 10000}, {name: "100k Likes", price: 600, qty: 100000}
        ],
        "ig_likes_in": [
            {name: "1k Indian Likes 🇮🇳", price: 15, qty: 1000}, {name: "10k Indian Likes 🇮🇳", price: 120, qty: 10000}, {name: "100k Indian Likes 🇮🇳", price: 1100, qty: 100000}
        ],
        "ig_shares": [
            {name: "100 Shares", price: 1, qty: 100}, {name: "1k Shares", price: 1.5, qty: 1000}, {name: "10k Shares", price: 12, qty: 10000}, {name: "100k Shares", price: 8, qty: 100000}
        ],
        "ig_f_no": [
            {name: "100 Followers (No Refill)", price: 3, qty: 100}, {name: "1k Followers (No Refill)", price: 20, qty: 1000}, {name: "10k Followers (No Refill)", price: 190, qty: 10000}
        ],
        "ig_f_10": [
            {name: "100 Followers (0-10% Drop)", price: 3, qty: 100}, {name: "1k Followers (0-10% Drop)", price: 36, qty: 1000}, {name: "10k Followers (0-10% Drop)", price: 350, qty: 10000}
        ],
        "ig_f_05": [
            {name: "100 Followers (0-05% Drop)", price: 5, qty: 100}, {name: "1k Followers (0-05% Drop)", price: 50, qty: 1000}, {name: "10k Followers (0-05% Drop)", price: 420, qty: 10000}
        ],
        "ig_pkg_f": [{name: "5k Follower Package 📦", price: 380, qty: 5000}, {name: "10k Follower Package 📦", price: 750, qty: 10000}],
        "ig_views_pkg": [
            {name: "10k Views Package 📦", price: 5, qty: 10000}, {name: "50k Views Package 📦", price: 17, qty: 50000},
            {name: "100k Views Package 📦", price: 25, qty: 100000}, {name: "500k Views Package 📦", price: 60, qty: 500000}, {name: "1M Views Package 📦", price: 120, qty: 1000000}
        ],
        "ig_likes_pkg": [{name: "10k Likes Package 📦", price: 90, qty: 10000}, {name: "20k Likes Package 📦", price: 160, qty: 20000}],
        "ig_comm": [{name: "100 Comments Random", price: 7, qty: 100}, {name: "1k Comments Random", price: 46, qty: 1000}]
    };

    function loadServices() {
        const cat = document.getElementById("categorySelect").value;
        const sSelect = document.getElementById("serviceSelect");
        sSelect.innerHTML = "";
        if(cat && serviceData[cat]) {
            serviceData[cat].forEach(s => {
                let opt = document.createElement("option");
                opt.value = JSON.stringify(s);
                opt.text = `${s.name} - ₹${s.price}`;
                sSelect.add(opt);
            });
        } else { sSelect.add(new Option("Select Category First", "")); }
        updatePrice();
    }

    function updatePrice() {
        const val = document.getElementById("serviceSelect").value;
        if(val) {
            const s = JSON.parse(val);
            document.getElementById("priceDisplay").innerText = "₹" + s.price;
            document.getElementById("finalAmt").innerText = s.price;
            document.getElementById("qrImg").src = `https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=upi://pay?pa=7388720012@fam%26am=${s.price}%26cu=INR`;
        }
    }

    function showQR() {
        if(!document.getElementById("targetLink").value) return alert("Link daalo!");
        document.getElementById("qr-section").style.display = "block";
        document.getElementById("payBtn").style.display = "none";
    }

    // History Logic
    function saveToHistory(order) {
        let history = JSON.parse(localStorage.getItem('myOrders')) || [];
        history.unshift(order);
        localStorage.setItem('myOrders', JSON.stringify(history));
    }

    function openHistory() {
        const modal = document.getElementById("history-modal");
        const list = document.getElementById("historyList");
        modal.style.display = "flex";
        let history = JSON.parse(localStorage.getItem('myOrders')) || [];
        if(history.length === 0) {
            list.innerHTML = '<p style="text-align:center; color:#64748b;">No orders yet.</p>';
        } else {
            list.innerHTML = history.map(h => `
                <div class="history-item">
                    <b>${h.service}</b><br>
                    <span>Price:</span> ₹${h.price} | <span>UTR:</span> ${h.utr}<br>
                    <small>${h.date}</small>
                </div>
            `).join('');
        }
    }

    function closeHistory() { document.getElementById("history-modal").style.display = "none"; }

    async function submitOrder() {
        let utr = document.getElementById("utr").value.trim();
        if(utr.length < 12) return alert("Sahi 12-digit UTR daalo!");
        const s = JSON.parse(document.getElementById("serviceSelect").value);
        const orderInfo = { service: s.name, price: s.price, utr: utr, date: new Date().toLocaleString() };

        document.getElementById("confirmBtn").innerText = "Processing...";
        try {
            await fetch(scriptURL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(orderInfo) });
            saveToHistory(orderInfo);
            alert("✅ Order Placed Successfully!");
            location.reload();
        } catch (e) { alert("Error!"); }
    }
</script>
</body>
</html>
