<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMMbyAS - MD SUHEL</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #38bdf8; --bg: #0f172a; --card: #1e293b; --whatsapp: #25d366; --gold: #facc15; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; display: flex; flex-direction: column; align-items: center; padding: 15px; margin: 0; padding-bottom: 120px; overflow-x: hidden; }
        
        /* Logo & Animation */
        .header-top { width: 100%; max-width: 450px; display: flex; justify-content: center; margin-bottom: 10px; padding: 10px 0; }
        .logo-box { background: rgba(255, 255, 255, 0.1); padding: 8px 25px; border-radius: 50px; border: 2px solid rgba(255,255,255,0.2); }
        .changing-text { font-weight: 900; letter-spacing: 2px; font-size: 18px; animation: rainbow 3s linear infinite; text-transform: uppercase; }
        @keyframes rainbow { 0% { color: #ff0000; text-shadow: 0 0 10px #ff0000; } 50% { color: #00ff00; text-shadow: 0 0 10px #00ff00; } 100% { color: #ff0000; text-shadow: 0 0 10px #ff0000; } }

        /* Order Stats Design (New) */
        .order-stats-container { width: 100%; max-width: 450px; margin-bottom: 20px; }
        .stats-glass-card { background: linear-gradient(135deg, rgba(56, 189, 248, 0.2), rgba(15, 23, 42, 0.8)); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 20px; text-align: center; backdrop-filter: blur(10px); box-shadow: 0 8px 32px rgba(0,0,0,0.5); position: relative; overflow: hidden; }
        .stats-glass-card::before { content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%); animation: rotate 10s linear infinite; }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .stats-label { color: var(--primary); font-size: 12px; font-weight: bold; letter-spacing: 2px; margin-bottom: 5px; position: relative; }
        .stats-number { font-size: 45px; font-weight: 900; color: white; margin: 0; position: relative; text-shadow: 0 0 20px var(--primary); }
        .live-dot { height: 10px; width: 10px; background-color: #22c55e; border-radius: 50%; display: inline-block; margin-right: 5px; animation: blink 1s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        /* Price List Section (New) */
        .price-list-box { width: 100%; max-width: 450px; background: #1e293b; border-radius: 15px; border: 1px solid #334155; padding: 15px; margin-bottom: 20px; box-sizing: border-box; }
        .price-title { font-size: 14px; font-weight: bold; color: var(--gold); border-bottom: 1px solid #334155; padding-bottom: 8px; margin-bottom: 10px; display: flex; justify-content: space-between; }
        .price-item { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 5px; color: #cbd5e1; }
        .price-tag { color: #22c55e; font-weight: bold; }

        /* Form Card */
        .card { background: var(--card); padding: 20px; border-radius: 15px; width: 100%; max-width: 450px; border: 1px solid #334155; box-shadow: 0 10px 25px rgba(0,0,0,0.3); box-sizing: border-box; margin-bottom: 20px; }
        label { display: block; margin: 12px 0 6px; font-weight: 600; font-size: 13px; color: #94a3b8; text-transform: uppercase; }
        input, select { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; margin-bottom: 10px; outline: none; box-sizing: border-box; }
        .price-box { background: #0ea5e9; color: white; padding: 15px; border-radius: 10px; text-align: center; font-weight: bold; font-size: 26px; margin: 20px 0; }
        .btn-pay { width: 100%; background: #22c55e; color: white; border: none; padding: 16px; border-radius: 10px; cursor: pointer; font-size: 18px; font-weight: bold; }

        /* Customer Care Float (New) */
        .care-float { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 400px; background: var(--whatsapp); color: white; padding: 15px; border-radius: 50px; display: flex; align-items: center; justify-content: center; gap: 10px; text-decoration: none; font-weight: bold; box-shadow: 0 10px 20px rgba(0,0,0,0.4); z-index: 2000; border: 2px solid white; transition: 0.3s; }
        .care-float:active { transform: translateX(-50%) scale(0.95); }

        #qr-section { display: none; text-align: center; border-top: 1px dashed #334155; padding-top: 15px; }
    </style>
</head>
<body>

<div class="header-top">
    <div class="logo-box"><span class="changing-text">SMMbyAS</span></div>
</div>

<div class="order-stats-container">
    <div class="stats-glass-card">
        <div class="stats-label"><span class="live-dot"></span> LIVE ORDER STATUS</div>
        <h2 class="stats-number" id="totalOrdersCount">315</h2>
        <p style="font-size: 10px; color: #94a3b8; margin: 5px 0 0 0; font-weight: bold; text-transform: uppercase;">Total Success Deliveries</p>
    </div>
</div>

<div class="price-list-box">
    <div class="price-title"><span>🚀 TOP SERVICES</span> <span>PRICE</span></div>
    <div class="price-item"><span>Instagram Views [1k]</span> <span class="price-tag">₹1</span></div>
    <div class="price-item"><span>Instagram Likes [1k]</span> <span class="price-tag">₹10</span></div>
    <div class="price-item"><span>YT Subs [Non-G] [1k]</span> <span class="price-tag">₹10</span></div>
    <div class="price-item"><span>YT Likes [1k]</span> <span class="price-tag">₹8</span></div>
</div>

<div class="card">
    <label><i class="fas fa-link"></i> Target Link</label>
    <input type="text" id="targetLink" placeholder="Paste link here...">

    <label><i class="fas fa-list"></i> Category</label>
    <select id="categorySelect" onchange="loadServices()">
        <option value="">-- Choose Category --</option>
        <optgroup label="Instagram Services">
            <option value="ig_views">Instagram Views 🎬</option>
            <option value="ig_likes">Instagram Likes ❤️</option>
            <option value="yt_sub_ng">YT Subs [Not Guaranteed] 🔴</option>
        </optgroup>
    </select>

    <label><i class="fas fa-box-open"></i> Select Package</label>
    <select id="serviceSelect" onchange="updatePrice()"><option value="">Select Category First</option></select>

    <div class="price-box" id="priceDisplay">₹0.00</div>
    
    <button class="btn-pay" id="payBtn" onclick="showQR()">Place Order</button>

    <div id="qr-section">
        <p style="color:var(--gold); font-weight:bold;">Payable: ₹<span id="finalAmt">0.00</span></p>
        <img src="" id="qrImg" style="width:200px; border:5px solid white; border-radius:10px;">
        <p style="font-size:12px;">UPI: 7388720012@fam</p>
        <input type="text" id="utr" placeholder="Enter 12 Digit UTR Number">
        <button class="btn-pay" style="background:#2563eb;" id="confirmBtn" onclick="submitOrder()">Confirm Payment</button>
    </div>
</div>

<a href="https://wa.me/917388720012?text=Hello%20SSMBYAS,%20I%20need%20help!" class="care-float">
    <i class="fab fa-whatsapp" style="font-size: 24px;"></i>
    <span>CUSTOMER CARE 24x7</span>
</a>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbyqdvyG3GVA5PAAFPSVrbi2JOc1vwewJCheoxRvgG7cxaz8A1VEjaTkRKCc4qAh9VnX/exec';
    
    // Services Data
    const serviceData = {
        "ig_views": [{name: "1k Views", price: 1, qty: 1000}, {name: "10k Views", price: 4, qty: 10000}],
        "ig_likes": [{name: "1k Likes", price: 10, qty: 1000}],
        "yt_sub_ng": [{name: "1k Subs [NG]", price: 10, qty: 1000}]
    };

    function loadServices() {
        const cat = document.getElementById("categorySelect").value;
        const sSelect = document.getElementById("serviceSelect");
        sSelect.innerHTML = "";
        if(cat && serviceData[cat]) {
            serviceData[cat].forEach(s => {
                let opt = document.createElement("option");
                opt.value = JSON.stringify(s);
                opt.text = `${s.name} - ₹${s.price}`;
                sSelect.add(opt);
            });
        }
        updatePrice();
    }

    function updatePrice() {
        const val = document.getElementById("serviceSelect").value;
        if(val) {
            const s = JSON.parse(val);
            document.getElementById("priceDisplay").innerText = "₹" + s.price;
            document.getElementById("finalAmt").innerText = s.price;
            document.getElementById("qrImg").src = `https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=upi://pay?pa=7388720012@fam%26am=${s.price}%26cu=INR`;
        }
    }

    function showQR() {
        if(!document.getElementById("targetLink").value) return alert("Link daalo!");
        document.getElementById("qr-section").style.display = "block";
        document.getElementById("payBtn").style.display = "none";
    }

    async function submitOrder() {
        let utr = document.getElementById("utr").value.trim();
        if(utr.length < 12) return alert("Sahi 12-digit UTR daalo!");
        alert("✅ Order Placed! Suhel Bhai check karke start kar denge.");
        location.reload();
    }

    // Auto-update order count
    let count = 315;
    setInterval(() => {
        if(Math.random() > 0.7) {
            count++;
            document.getElementById("totalOrdersCount").innerText = count;
        }
    }, 10000);
</script>
</body>
</html>
