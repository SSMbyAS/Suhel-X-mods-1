<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMMbyAS PANEL</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #38bdf8; --bg: #0f172a; --card: #1e293b; --whatsapp: #25d366; --telegram: #0088cc; --youtube: #ff0000; --gold: #facc15; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; display: flex; flex-direction: column; align-items: center; padding: 15px; margin: 0; padding-bottom: 100px; }
        
        .logo-box { background: rgba(255, 255, 255, 0.1); padding: 8px 25px; border-radius: 50px; border: 2px solid rgba(255,255,255,0.2); margin-top: 10px; }
        .changing-text { font-weight: 900; letter-spacing: 2px; font-size: 18px; color: var(--primary); }

        .card { background: var(--card); padding: 20px; border-radius: 15px; width: 100%; max-width: 450px; border: 1px solid #334155; box-sizing: border-box; margin-top: 20px; }
        label { display: block; margin: 12px 0 6px; font-weight: 600; font-size: 13px; color: #94a3b8; }
        input, select { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; margin-bottom: 10px; box-sizing: border-box; }
        
        .price-box { background: #0ea5e9; color: white; padding: 15px; border-radius: 10px; text-align: center; font-weight: bold; font-size: 26px; margin: 15px 0; }
        .btn-pay { width: 100%; background: #22c55e; color: white; border: none; padding: 16px; border-radius: 10px; cursor: pointer; font-size: 18px; font-weight: bold; }

        #qr-section { display: none; text-align: center; margin-top: 20px; border-top: 1px dashed #334155; padding-top: 15px; }
        .qr-img { width: 200px; border: 5px solid white; border-radius: 10px; margin: 10px 0; }

        #reseller-badge { display: none; background: var(--gold); color: #000; padding: 10px; border-radius: 8px; font-weight: bold; margin-bottom: 15px; text-align: center; width: 100%; max-width: 430px; }
        
        /* Modal Styles */
        #reseller-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 2000; align-items: center; justify-content: center; }
        .modal-box { background: var(--card); padding: 25px; border-radius: 15px; width: 85%; max-width: 320px; text-align: center; }

        .float-btns { position: fixed; bottom: 20px; right: 20px; display: flex; flex-direction: column; gap: 10px; }
        .circle-btn { width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; text-decoration: none; font-size: 20px; cursor: pointer; border: 2px solid white; }
    </style>
</head>
<body>

<div class="logo-box"><span class="changing-text">SMMbyAS PANEL</span></div>

<div id="reseller-badge"><i class="fas fa-crown"></i> RESELLER MODE: ₹1 DISCOUNT ACTIVE</div>

<div class="card">
    <label><i class="fas fa-link"></i> Target Link</label>
    <input type="text" id="targetLink" placeholder="Paste link here...">

    <label><i class="fas fa-list"></i> Category</label>
    <select id="categorySelect" onchange="loadServices()">
        <option value="">-- Choose Category --</option>
        <option value="ig_views">Instagram Views 🎬</option>
        <option value="ig_likes">Instagram Likes ❤️</option>
        <option value="ig_followers">Instagram Followers 👥</option>
        <option value="yt_views">YouTube Views 🔴</option>
    </select>

    <label><i class="fas fa-box-open"></i> Select Package</label>
    <select id="serviceSelect" onchange="updatePrice()">
        <option value="">Select Category First</option>
    </select>

    <label><i class="fas fa-sort-amount-up"></i> Enter Quantity (Min: 1000)</label>
    <input type="number" id="customQty" value="1000" min="1000" oninput="updatePrice()">

    <div class="price-box" id="priceDisplay">₹0.00</div>
    
    <button class="btn-pay" id="payBtn" onclick="showQR()">Place Order</button>

    <div id="qr-section">
        <p style="color:var(--gold); font-weight:bold;">Payable: ₹<span id="finalAmt">0.00</span></p>
        <img src="" id="qrImg" class="qr-img">
        <p style="font-size:12px;">UPI: 7388720012@fam</p>
        <input type="text" id="utr" placeholder="Enter 12 Digit UTR Number">
        <button class="btn-pay" style="background:#2563eb;" onclick="submitOrder()">Confirm Payment</button>
    </div>
</div>

<div class="float-btns">
    <div class="circle-btn" style="background:var(--gold)" onclick="openResellerModal()"><i class="fas fa-crown"></i></div>
    <a href="https://wa.me/917388720012" class="circle-btn" style="background:var(--whatsapp)"><i class="fab fa-whatsapp"></i></a>
</div>

<div id="reseller-modal">
    <div class="modal-box">
        <h3 style="color:var(--gold)">Reseller Login</h3>
        <input type="text" id="rUser" placeholder="Username">
        <input type="password" id="rPass" placeholder="Password">
        <button class="btn-pay" style="background:var(--gold); color:#000;" onclick="loginReseller()">Login</button>
        <button style="background:none; border:none; color:white; margin-top:10px;" onclick="closeModal()">Close</button>
    </div>
</div>

<script>
    let isReseller = false;

    // Service Data (Price per 1000)
    const serviceData = {
        "ig_views": [{name: "Instant Views", price: 1}], // 4k views = ₹3 logic niche calculation mein hai
        "ig_likes": [{name: "Real Likes", price: 10}],
        "ig_followers": [{name: "Non-Drop Followers", price: 40}],
        "yt_views": [{name: "High Retention", price: 70}]
    };

    function loadServices() {
        const cat = document.getElementById("categorySelect").value;
        const sSelect = document.getElementById("serviceSelect");
        sSelect.innerHTML = "";
        
        if(cat && serviceData[cat]) {
            serviceData[cat].forEach(s => {
                let opt = document.createElement("option");
                opt.value = s.price;
                opt.text = s.name;
                sSelect.add(opt);
            });
        } else {
            sSelect.add(new Option("Select Category First", ""));
        }
        updatePrice();
    }

    function updatePrice() {
        const basePrice = parseFloat(document.getElementById("serviceSelect").value) || 0;
        const qty = parseInt(document.getElementById("customQty").value) || 0;
        const cat = document.getElementById("categorySelect").value;

        let finalPrice = 0;

        if (cat === "ig_views") {
            // Special Formula: 4000 views = ₹3
            finalPrice = (qty * 3) / 4000;
        } else {
            // Normal Formula: (Price per 1000 * Qty) / 1000
            finalPrice = (basePrice * qty) / 1000;
        }

        // Reseller Discount
        if (isReseller && finalPrice > 2) {
            finalPrice = finalPrice - 1;
        }

        const displayPrice = finalPrice.toFixed(2);
        document.getElementById("priceDisplay").innerText = "₹" + displayPrice;
        document.getElementById("finalAmt").innerText = displayPrice;
        
        // Update QR Code
        const upiID = "7388720012@fam";
        document.getElementById("qrImg").src = `https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=upi://pay?pa=${upiID}%26am=${displayPrice}%26cu=INR`;
    }

    function showQR() {
        const link = document.getElementById("targetLink").value;
        if(!link) return alert("Pehle link daalo!");
        document.getElementById("qr-section").style.display = "block";
        document.getElementById("payBtn").style.display = "none";
    }

    function loginReseller() {
        const u = document.getElementById("rUser").value;
        const p = document.getElementById("rPass").value;
        if(u === "reseller" && p === "suhel123") {
            isReseller = true;
            document.getElementById("reseller-badge").style.display = "block";
            closeModal();
            updatePrice();
            alert("Reseller Mode On! ✅");
        } else {
            alert("Galat Details! ❌");
        }
    }

    function closeModal() { document.getElementById('reseller-modal').style.display = 'none'; }
    function openResellerModal() { document.getElementById('reseller-modal').style.display = 'flex'; }

    function submitOrder() {
        const utr = document.getElementById("utr").value;
        if(utr.length < 12) return alert("Sahi UTR daalo!");
        alert("Order Received! ✅ Ye 30 minutes mein start ho jayega.");
        location.reload();
    }
</script>

</body>
</html>
